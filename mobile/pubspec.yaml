name: poketto
description: Aplikasi keuangan pribadi

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  path_provider: ^2.1.1
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  pdf: ^3.10.7
  open_file: ^3.3.2
  http: ^1.6.0
  flutter_secure_storage: ^10.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
